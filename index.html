<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner Solution Hub — Purview Data &amp; AI Security</title>
    <meta
      name="description"
      content="Wissens- und Enablement-Hub für Microsoft-Partner: Beratungs- und Managed-Service-Lösungen mit Microsoft Purview entwickeln."
    />
  </head>
  <body>
    <script>
      // Theme vor dem Rendern setzen, um Flackern zu vermeiden
      ;(function () {
        try {
          var t = localStorage.getItem('psa-theme')
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
